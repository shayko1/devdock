<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14172a"/>
      <stop offset="100%" style="stop-color:#080a12"/>
    </linearGradient>

    <radialGradient id="ambient" cx="50%" cy="50%" r="45%">
      <stop offset="0%"   style="stop-color:#38bdf8; stop-opacity:0.10"/>
      <stop offset="55%"  style="stop-color:#818cf8; stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#38bdf8; stop-opacity:0"/>
    </radialGradient>

    <!-- Subtle glow: blur then merge with source -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Strong glow for central hub -->
    <filter id="hubGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="3" y="3" width="1018" height="1018" rx="228"
        fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.08"/>

  <!-- Ambient glow -->
  <circle cx="512" cy="512" r="380" fill="url(#ambient)"/>

  <!--
    3 nodes at radius 265 from center (512,512):
      Top         (512, 247)
      Bottom-right(742, 644)   512 + 265*cos(30°), 512 + 265*sin(30°)
      Bottom-left (282, 644)   512 - 265*cos(30°), 512 + 265*sin(30°)
  -->

  <!-- Connecting triangle — very faint dashed -->
  <polygon points="512,247 742,644 282,644"
           fill="none" stroke="#6366f1"
           stroke-width="2" stroke-dasharray="10,14" opacity="0.22"/>

  <!-- Spoke soft-glow halos -->
  <line x1="512" y1="512" x2="512" y2="247"
        stroke="#38bdf8" stroke-width="32" stroke-linecap="round" opacity="0.10"/>
  <line x1="512" y1="512" x2="742" y2="644"
        stroke="#a855f7" stroke-width="32" stroke-linecap="round" opacity="0.10"/>
  <line x1="512" y1="512" x2="282" y2="644"
        stroke="#a855f7" stroke-width="32" stroke-linecap="round" opacity="0.10"/>

  <!-- Spoke main lines -->
  <line x1="512" y1="512" x2="512" y2="247"
        stroke="#38bdf8" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="512" y1="512" x2="742" y2="644"
        stroke="#a855f7" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="512" y1="512" x2="282" y2="644"
        stroke="#a855f7" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Outer node halos -->
  <circle cx="512" cy="247" r="54" fill="#38bdf8" opacity="0.16"/>
  <circle cx="742" cy="644" r="54" fill="#a855f7" opacity="0.16"/>
  <circle cx="282" cy="644" r="54" fill="#a855f7" opacity="0.16"/>

  <!-- Outer nodes -->
  <circle cx="512" cy="247" r="30" fill="#0c1020" stroke="#38bdf8" stroke-width="5" filter="url(#glow)"/>
  <circle cx="742" cy="644" r="30" fill="#0c1020" stroke="#a855f7" stroke-width="5" filter="url(#glow)"/>
  <circle cx="282" cy="644" r="30" fill="#0c1020" stroke="#a855f7" stroke-width="5" filter="url(#glow)"/>

  <!-- Outer node inner dots -->
  <circle cx="512" cy="247" r="9" fill="#7dd3fc"/>
  <circle cx="742" cy="644" r="9" fill="#d8b4fe"/>
  <circle cx="282" cy="644" r="9" fill="#d8b4fe"/>

  <!-- Central hub — outer ambient -->
  <circle cx="512" cy="512" r="88" fill="#38bdf8" opacity="0.13" filter="url(#hubGlow)"/>

  <!-- Central hub — outer ring -->
  <circle cx="512" cy="512" r="55" fill="#0c1020" stroke="#38bdf8" stroke-width="6" filter="url(#glow)"/>

  <!-- Central hub — inner ring (depth accent) -->
  <circle cx="512" cy="512" r="38" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.30"/>

  <!-- Central hub — bright fill -->
  <circle cx="512" cy="512" r="24" fill="#38bdf8" opacity="0.88" filter="url(#glow)"/>

  <!-- Central hub — white core -->
  <circle cx="512" cy="512" r="10" fill="#e8f8ff"/>
</svg>
